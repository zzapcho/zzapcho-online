name: Verify Content

on:
  push:
  pull_request:

jobs:
  verify-content:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run manifest
      - run: npm run content:verify
      - run: npm run content:summary
